<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vendas — LivroCaixa ERP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../css/design-system.css">
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<div class="app-shell">
  <aside class="sidebar" id="sidebar-modulos">
    <div class="sidebar-brand">
      <div class="mark">L</div>
      <div class="name">LivroCaixa<small>ERP</small></div>
    </div>
    <div class="sidebar-scroll">
      <nav class="sidebar-nav">
        <a href="../financeiro/dashboard.html" class="sidebar-link"><i data-lucide="wallet"></i> Financeiro</a>
        <a href="../producao/dashboard.html" class="sidebar-link"><i data-lucide="factory"></i> Produção</a>
        <a href="../pcp/dashboard.html" class="sidebar-link"><i data-lucide="calendar-clock"></i> PCP</a>
        <a href="../estoque/dashboard.html" class="sidebar-link"><i data-lucide="package"></i> Estoque</a>
        <a href="../compras/dashboard.html" class="sidebar-link"><i data-lucide="shopping-cart"></i> Compras</a>
        <a href="../vendas/dashboard.html" class="sidebar-link active"><i data-lucide="trending-up"></i> Vendas</a>
        <a href="../logistica/dashboard.html" class="sidebar-link"><i data-lucide="truck"></i> Logística/Expedição</a>
        <a href="../qualidade/dashboard.html" class="sidebar-link"><i data-lucide="badge-check"></i> Qualidade</a>
        <a href="../manutencao/dashboard.html" class="sidebar-link"><i data-lucide="wrench"></i> Manutenção</a>
        <a href="../fiscal/dashboard.html" class="sidebar-link"><i data-lucide="file-text"></i> Fiscal</a>
        <a href="../rh/dashboard.html" class="sidebar-link"><i data-lucide="users-round"></i> RH</a>
      </nav>
    </div>
    <div class="sidebar-footer">
      <button class="theme-toggle" id="theme-toggle-sidebar" style="width:100%; justify-content:center;"><i data-lucide="moon"></i> Alternar tema</button>
    </div>
  </aside>
  <div class="app-main">
<header class="topbar">
  <div class="brand">Livro<span style="color:var(--accent)">Caixa</span><small>ERP</small></div>
  <div class="topbar-right">
    <div class="user-chip" id="user-chip">
      <div class="avatar" id="user-avatar">--</div>
      <span id="user-nome">Carregando…</span>
    </div>
  </div>
</header>

<main class="page">
  <div class="page-header">
    <div>
      <span class="eyebrow">Vendas</span>
      <h1>Pedidos de Venda</h1>
    </div>
    <a href="pedido-novo.html" class="btn primary">＋ Novo Pedido</a>
  </div>

  <div class="toolbar">
    <input class="input" id="busca" placeholder="Buscar por cliente ou nº do pedido...">
    <select class="input" id="f_status" style="max-width:180px;">
      <option value="">Status: todos</option>
      <option value="aberto">Aberto</option>
      <option value="em_producao">Em Produção</option>
      <option value="faturado">Faturado</option>
      <option value="cancelado">Cancelado</option>
    </select>
    <span class="count-pill" id="contador">0 pedidos</span>
    <div class="spacer"></div>
  </div>

  <section class="card" style="padding:0; overflow:hidden;">
    <table>
      <thead>
        <tr><th>Data</th><th>Nº Pedido</th><th>Cliente</th><th>Entrega Prevista</th><th>Status</th><th class="num">Valor Total</th><th class="num">Ações</th></tr>
      </thead>
      <tbody id="tbody"><tr><td colspan="7" class="empty-state">Carregando…</td></tr></tbody>
    </table>
  </section>
</main>
  </div>
</div>

<script type="module">
import { supabase, exigirSessao, usuarioAtual } from '../../js/supabase-client.js';
import { initNav } from '../../js/nav.js';
initNav();

const sessao = await exigirSessao();
const usuario = await usuarioAtual();
if (usuario) {
  document.getElementById('user-nome').textContent = usuario.nome;
  document.getElementById('user-avatar').textContent = usuario.nome.slice(0,2).toUpperCase();
}
document.getElementById('user-chip').addEventListener('click', async () => {
  if (confirm('Sair do sistema?')) { await supabase.auth.signOut(); window.location.href = '../../index.html'; }
});

const fmt = v => 'R$ ' + Number(v||0).toLocaleString('pt-BR', {minimumFractionDigits:2});
const ROTULO_STATUS = { aberto: 'Aberto', em_producao: 'Em Produção', faturado: 'Faturado', cancelado: 'Cancelado' };
const CLASSE_STATUS = { aberto: 'aberto', em_producao: 'parcial', faturado: 'pago', cancelado: 'inadimplente' };

let registros = [];

async function carregar() {
  document.getElementById('tbody').innerHTML = `<tr><td colspan="7" class="empty-state">Carregando…</td></tr>`;
  let query = supabase.from('pedidos_venda').select('id, numero_pedido, data_pedido, data_entrega_prevista, status, favorecidos(nome), pedido_venda_itens(quantidade, valor_unitario)').order('data_pedido', { ascending: false });
  const status = document.getElementById('f_status').value;
  if (status) query = query.eq('status', status);
  const { data, error } = await query;
  if (error) { document.getElementById('tbody').innerHTML = `<tr><td colspan="7" class="empty-state" style="color:var(--red)">Erro: ${error.message}</td></tr>`; return; }
  registros = (data || []).map(r => ({ ...r, valorTotal: (r.pedido_venda_itens||[]).reduce((s,i) => s + Number(i.quantidade)*Number(i.valor_unitario), 0) }));
  desenhar();
}

function desenhar() {
  const busca = document.getElementById('busca').value.trim().toLowerCase();
  const filtrados = busca ? registros.filter(r => JSON.stringify(r).toLowerCase().includes(busca)) : registros;
  document.getElementById('contador').textContent = `${filtrados.length} pedido${filtrados.length===1?'':'s'}`;
  if (!filtrados.length) { document.getElementById('tbody').innerHTML = `<tr><td colspan="7" class="empty-state">Nenhum pedido encontrado. <a href="pedido-novo.html">Lançar o primeiro</a>.</td></tr>`; return; }

  document.getElementById('tbody').innerHTML = filtrados.map(r => `
    <tr>
      <td>${new Date(r.data_pedido+'T00:00:00').toLocaleDateString('pt-BR')}</td>
      <td>${r.numero_pedido ?? '-'}</td>
      <td>${r.favorecidos?.nome ?? '-'}</td>
      <td>${r.data_entrega_prevista ? new Date(r.data_entrega_prevista+'T00:00:00').toLocaleDateString('pt-BR') : '-'}</td>
      <td><span class="badge ${CLASSE_STATUS[r.status]}">${ROTULO_STATUS[r.status]}</span></td>
      <td class="num mono">${fmt(r.valorTotal)}</td>
      <td class="num"><a href="pedido-novo.html?id=${r.id}" class="icon-btn">Editar</a></td>
    </tr>`).join('');
}

document.getElementById('busca').addEventListener('input', desenhar);
document.getElementById('f_status').addEventListener('change', carregar);
await carregar();
</script>
</body>
</html>
