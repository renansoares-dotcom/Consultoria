<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redefinir Senha — Fluxo de Caixa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/design-system.css">
<style>
  body.login {
    background: var(--ledger); min-height: 100vh; display: flex;
    align-items: center; justify-content: center; padding: 24px;
  }
  .login-card { width: 100%; max-width: 380px; background: var(--paper-raised); border-radius: var(--radius-md); padding: 36px 32px 30px; box-shadow: 0 24px 60px rgba(0,0,0,.35); }
  .login-card .brand { font-family: var(--font-display); font-size: 22px; font-weight: 600; display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
  .login-card .sub { color: var(--ink-soft); font-size: 13px; margin-bottom: 26px; }
  #aviso { display: none; font-size: 12.5px; padding: 10px 12px; border-radius: var(--radius-sm); margin-bottom: 16px; }
</style>
</head>
<body class="login">

<form class="login-card" id="form-nova-senha">
  <div class="brand">Livro<span style="color:var(--accent)">Caixa</span></div>
  <div class="sub">Defina sua nova senha de acesso.</div>

  <div id="aviso"></div>

  <label class="field">
    <span class="field-label">Nova senha</span>
    <input class="input" type="password" id="senha1" required minlength="6" autocomplete="new-password">
  </label>
  <label class="field">
    <span class="field-label">Confirme a nova senha</span>
    <input class="input" type="password" id="senha2" required minlength="6" autocomplete="new-password">
  </label>

  <button class="btn primary" type="submit" style="width:100%; padding:12px;" id="btn-salvar">Salvar nova senha</button>
</form>

<script type="module">
  import { supabase } from '../js/supabase-client.js';

  const aviso = document.getElementById('aviso');
  function mostrar(msg, tipo) {
    aviso.textContent = msg;
    aviso.style.display = 'block';
    aviso.style.background = tipo === 'erro' ? 'var(--red-soft)' : (tipo === 'ok' ? 'var(--accent-soft)' : 'var(--amber-soft)');
    aviso.style.color = tipo === 'erro' ? 'var(--red)' : (tipo === 'ok' ? 'var(--accent)' : 'var(--amber)');
  }

  // O Supabase troca o token do link do e-mail por uma sessão válida automaticamente
  // e dispara o evento PASSWORD_RECOVERY — sem sessão, não deixamos trocar a senha.
  let sessaoValida = false;
  supabase.auth.onAuthStateChange((event, session) => {
    if (event === 'PASSWORD_RECOVERY' || session) sessaoValida = true;
  });
  const { data: { session } } = await supabase.auth.getSession();
  if (session) sessaoValida = true;

  document.getElementById('form-nova-senha').addEventListener('submit', async (e) => {
    e.preventDefault();
    const s1 = document.getElementById('senha1').value;
    const s2 = document.getElementById('senha2').value;

    if (s1 !== s2) { mostrar('As senhas não coincidem.', 'aviso'); return; }
    if (!sessaoValida) { mostrar('Link inválido ou expirado. Solicite um novo link de redefinição na tela de login.', 'erro'); return; }

    const btn = document.getElementById('btn-salvar');
    btn.disabled = true; btn.textContent = 'Salvando…';

    const { error } = await supabase.auth.updateUser({ password: s1 });

    btn.disabled = false; btn.textContent = 'Salvar nova senha';

    if (error) { mostrar('Erro ao salvar: ' + error.message, 'erro'); return; }
    mostrar('Senha redefinida com sucesso! Redirecionando para o login…', 'ok');
    setTimeout(() => { window.location.href = '../index.html'; }, 2000);
  });
</script>
</body>
</html>
