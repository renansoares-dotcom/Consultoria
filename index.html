<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fluxo de Caixa — Acesso</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/design-system.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  body.login {
    background: var(--ledger);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background-image:
      repeating-linear-gradient(180deg, rgba(255,255,255,.025) 0px, rgba(255,255,255,.025) 1px, transparent 1px, transparent 34px);
  }
  .login-card {
    width: 100%; max-width: 380px;
    background: var(--paper-raised);
    border-radius: var(--radius-md);
    padding: 36px 32px 30px;
    box-shadow: 0 24px 60px rgba(0,0,0,.35);
  }
  .login-card .brand {
    font-family: var(--font-display);
    font-size: 22px; font-weight: 600;
    display: flex; align-items: baseline; gap: 8px;
    margin-bottom: 4px;
  }
  .login-card .brand small {
    font-family: var(--font-mono); font-size: 10px; letter-spacing: .08em;
    color: var(--accent); font-weight: 500;
  }
  .login-card .sub { color: var(--ink-soft); font-size: 13px; margin-bottom: 26px; }
  #erro {
    display: none;
    background: var(--red-soft); color: var(--red);
    font-size: 12.5px; padding: 10px 12px; border-radius: var(--radius-sm);
    margin-bottom: 16px;
  }
  .login-footer { text-align: center; margin-top: 18px; font-size: 11px; color: rgba(255,255,255,.5); font-family: var(--font-mono); }
</style>
</head>
<body class="login">

  <div>
    <form class="login-card" id="form-login">
      <div class="brand">Livro<span style="color:var(--accent)">Caixa</span> <small>CONSULTORIA</small></div>
      <div class="sub">Entre com suas credenciais para acessar o fluxo de caixa.</div>

      <div id="erro"></div>

      <label class="field">
        <span class="field-label">E-mail</span>
        <input class="input" type="email" id="email" required autocomplete="username" placeholder="voce@empresa.com.br">
      </label>
      <label class="field">
        <span class="field-label">Senha</span>
        <input class="input" type="password" id="senha" required autocomplete="current-password" placeholder="••••••••">
      </label>

      <button class="btn primary" type="submit" style="width:100%; padding:12px;" id="btn-entrar">Entrar</button>
      <div style="text-align:center; margin-top:14px;">
        <a href="#" id="link-esqueci" style="font-size:12.5px; color:var(--ink-soft); text-decoration:underline;">Esqueci minha senha</a>
      </div>
    </form>
    <div class="login-footer">ACESSO RESTRITO · DADOS AUDITADOS</div>
  </div>

<script type="module">
  import { supabase } from './js/supabase-client.js';
  import { initTheme } from './js/theme.js';
  initTheme();

  const form = document.getElementById('form-login');
  const erroBox = document.getElementById('erro');
  const btn = document.getElementById('btn-entrar');

  // Se já houver sessão válida, pula direto pro dashboard
  supabase.auth.getSession().then(({ data: { session } }) => {
    if (session) window.location.href = 'pages/dashboard.html';
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    erroBox.style.display = 'none';
    btn.textContent = 'Entrando...';
    btn.disabled = true;

    const email = document.getElementById('email').value.trim();
    const senha = document.getElementById('senha').value;

    const { error } = await supabase.auth.signInWithPassword({ email, password: senha });

    if (error) {
      erroBox.textContent = 'E-mail ou senha inválidos. Verifique e tente novamente.';
      erroBox.style.display = 'block';
      btn.textContent = 'Entrar';
      btn.disabled = false;
      return;
    }

    window.location.href = 'pages/dashboard.html';
  });

  document.getElementById('link-esqueci').addEventListener('click', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    if (!email) {
      erroBox.textContent = 'Digite seu e-mail no campo acima e clique em "Esqueci minha senha" de novo.';
      erroBox.style.display = 'block';
      erroBox.style.background = 'var(--amber-soft)';
      erroBox.style.color = 'var(--amber)';
      return;
    }
    const redirectTo = window.location.origin + window.location.pathname.replace('index.html', '') + 'pages/redefinir-senha.html';
    const { error } = await supabase.auth.resetPasswordForEmail(email, { redirectTo });
    erroBox.style.display = 'block';
    if (error) {
      erroBox.style.background = 'var(--red-soft)'; erroBox.style.color = 'var(--red)';
      erroBox.textContent = 'Erro ao enviar: ' + error.message;
    } else {
      erroBox.style.background = 'var(--accent-soft)'; erroBox.style.color = 'var(--accent)';
      erroBox.textContent = 'Enviamos um link de redefinição para ' + email + '. Confira sua caixa de entrada (e o spam).';
    }
  });
</script>
</body>
</html>
